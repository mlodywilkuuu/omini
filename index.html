<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>OMNI</title>
    <script src="https://translate.gtranslate.net/latest/float.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-nav {
            margin-top: 20px; padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            display: flex; align-items: center; gap: 30px;
            z-index: 1000;
        }

        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        .nav-links a:hover { opacity: 1; }

        /* Stylizacja menu języków */
        .lang-menu { position: relative; cursor: pointer; padding: 10px; }
        .lang-dropdown {
            position: absolute; top: 100%; right: 0;
            background: #1a1a1a; border: 1px solid #444;
            border-radius: 10px; padding: 10px; list-style: none;
            opacity: 0; visibility: hidden; transition: 0.3s;
            width: 120px; margin-top: 5px;
        }
        .lang-menu:hover .lang-dropdown { opacity: 1; visibility: visible; }
        .lang-dropdown li { padding: 8px; cursor: pointer; }
        .lang-dropdown li:hover { background: rgba(255,255,255,0.1); border-radius: 5px; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 3.5rem; margin-bottom: 20px; }
        
        .btn-download {
            margin-top: 30px;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }
        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.6);
        }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">OMNI</div>
        <ul class="nav-links">
            <li><a href="#">Download</a></li>
            <li><a href="#">Themes</a></li>
            <li><a href="#">Plugins</a></li>
            <li><a href="#">Devs</a></li>
        </ul>
        
        <div class="lang-menu">
            Language
            <ul class="lang-dropdown">
                <li onclick="doGTranslate('pl|en')">English</li>
                <li onclick="doGTranslate('pl|pl')">Polski</li>
                <li onclick="doGTranslate('pl|ru')">Русский</li>
                <li onclick="doGTranslate('pl|de')">Deutsch</li>
                <li onclick="doGTranslate('pl|es')">Español</li>
            </ul>
        </div>
    </nav>

    <main>
        <h1>Zapanuj nad Discordem</h1>
        <a href="#" class="btn-download">Download OMNI</a>
    </main>

    <script>
        function doGTranslate(lang_pair) {
            if(lang_pair.value) lang_pair = lang_pair.value;
            if(lang_pair == '') return;
            window.doGTranslate(lang_pair);
        }
    </script>
</body>
</html>
