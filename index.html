<style>
    /* Naprawa zamykania menu */
    .lang-menu { 
        position: relative; 
        cursor: pointer; 
        padding: 10px;
    }
    
    /* Zmieniamy z display: none na opacity i visibility dla płynności */
    .lang-dropdown {
        position: absolute; 
        top: 100%; 
        right: 0;
        background: rgba(0,0,0,0.9); 
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 10px;
        padding: 10px; 
        list-style: none;
        opacity: 0;
        visibility: hidden;
        transition: 0.3s;
        width: 140px;
        margin-top: 10px;
    }

    /* Menu pozostaje otwarte podczas najechania myszką */
    .lang-menu:hover .lang-dropdown {
        opacity: 1;
        visibility: visible;
    }

    .lang-dropdown li { 
        padding: 8px; 
        display: flex; 
        align-items: center; 
        gap: 10px;
        transition: 0.2s;
    }
    
    .lang-dropdown li:hover { background: rgba(255,255,255,0.1); border-radius: 5px; }
</style>

<div class="lang-menu">
    🌐 <span>Wybierz język</span>
    <ul class="lang-dropdown">
        <li onclick="changeLang('en')">🇬🇧 English</li>
        <li onclick="changeLang('pl')">🇵🇱 Polski</li>
        <li onclick="changeLang('ru')">🇷🇺 Русский</li>
        <li onclick="changeLang('de')">🇩🇪 Deutsch</li>
        <li onclick="changeLang('es')">🇪🇸 Español</li>
    </ul>
</div>
