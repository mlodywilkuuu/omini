<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI</title>
    <style>
        /* CSS wewnątrz HTML dla pewności */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            min-height: 100vh;
            /* Gradient z animacją */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Menu wyspa */
        .glass-nav {
            margin-top: 30px;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: 3px; }

        .nav-links { display: flex; list-style: none; gap: 30px; }

        .nav-links a { color: white; text-decoration: none; font-size: 1rem; opacity: 0.8; transition: 0.3s; }

        .nav-links a:hover { opacity: 1; }

        /* Treść */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 4rem; margin-bottom: 20px; }

        p { font-size: 1.2rem; color: #b8b8b8; margin-bottom: 40px; }

        .btn-main {
            background: white;
            color: #1a1a2e;
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-main:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">OMNI</div>
        <ul class="nav-links">
            <li><a href="#">Start</a></li>
            <li><a href="#">Pobierz</a></li>
            <li><a href="#">Funkcje</a></li>
        </ul>
    </nav>

    <main>
        <h1>Zapanuj nad Discordem</h1>
        <p>Twoje centrum modyfikacji w jednej aplikacji.</p>
        <a href="#" class="btn-main">Pobierz OMNI</a>
    </main>

</body>
</html>
