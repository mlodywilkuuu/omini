<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>OMNI</title>
    <!-- Google Translate Widget CSS -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            /* Nowy, subtelniejszy gradient */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex; flex-direction: column; align-items: center;
        }

        .glass-nav {
            margin-top: 20px; padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            display: flex; align-items: center; gap: 30px;
        }

        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        .nav-links a:hover { opacity: 1; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 3.5rem; margin-bottom: 20px; }
        .hero-btns { display: flex; gap: 15px; margin-top: 20px; }
        .btn { padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; }
        .btn-main { background: #00d2ff; color: #000; }
        .btn-sub { background: rgba(255,255,255,0.1); color: white; }

        /* Tłumacz */
        #google_translate_element { margin-left: 20px; }
        .goog-te-gadget-simple { background: transparent !important; border: none !important; }
        .goog-te-menu-value span { color: white !important; }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">OMNI</div>
        <ul class="nav-links">
            <li><a href="#">Download</a></li>
            <li><a href="#">Themes</a></li>
            <li><a href="#">Plugins</a></li>
            <li><a href="#">Devs</a></li>
        </ul>
        <div id="google_translate_element"></div>
    </nav>

    <main>
        <h1>Zapanuj nad Discordem</h1>
        <div class="hero-btns">
            <a href="#" class="btn btn-main">Download</a>
            <a href="#" class="btn btn-sub">Documentation</a>
        </div>
    </main>

    <!-- Skrypt tłumaczenia Google -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'pl',
                includedLanguages: 'en,pl,ru,de,es',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
