<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>OMNI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex; flex-direction: column; align-items: center;
        }

        .glass-nav {
            margin-top: 20px; padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            display: flex; align-items: center; gap: 30px;
        }

        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        .nav-links a:hover { opacity: 1; }

        /* Naprawione Menu Języków */
        .lang-menu { position: relative; cursor: pointer; padding: 10px; z-index: 1000; }
        .lang-dropdown {
            position: absolute; top: 100%; right: 0;
            background: #1a1a1a; border: 1px solid #444;
            border-radius: 10px; padding: 10px; list-style: none;
            opacity: 0; visibility: hidden; transition: 0.3s;
            width: 150px; margin-top: 5px;
        }
        .lang-menu:hover .lang-dropdown { opacity: 1; visibility: visible; }
        
        .lang-dropdown li { 
            padding: 8px; display: flex; align-items: center; gap: 10px; 
            font-size: 1.2rem; /* Powiększenie dla lepszej widoczności flag */
        }
        .lang-dropdown li span { font-size: 0.9rem; font-family: sans-serif; }
        .lang-dropdown li:hover { background: rgba(255,255,255,0.1); border-radius: 5px; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 3.5rem; margin-bottom: 20px; }
        
        .hero-btns { display: flex; gap: 15px; margin-top: 20px; }
        .btn { padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; color: white; }
        .btn-main { background: #00d2ff; color: #000; }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">OMNI</div>
        <ul class="nav-links">
            <li><a href="#">Download</a></li>
            <li><a href="#">Themes</a></li>
            <li><a href="#">Plugins</a></li>
            <li><a href="#">Devs</a></li>
        </ul>
        
        <div class="lang-menu">
            🌐 <span>Język</span>
            <ul class="lang-dropdown">
                <li onclick="changeLang('en')">🇬🇧 <span>English</span></li>
                <li onclick="changeLang('pl')">🇵🇱 <span>Polski</span></li>
                <li onclick="changeLang('ru')">🇷🇺 <span>Русский</span></li>
                <li onclick="changeLang('de')">🇩🇪 <span>Deutsch</span></li>
                <li onclick="changeLang('es')">🇪🇸 <span>Español</span></li>
            </ul>
        </div>
    </nav>

    <main>
        <h1>Zapanuj nad Discordem</h1>
        <div class="hero-btns">
            <a href="#" class="btn btn-main">Download</a>
        </div>
    </main>

    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'pl',
                autoDisplay: false
            }, 'google_translate_element');
        }

        function changeLang(lang) {
            var frame = document.querySelector('.goog-te-menu-frame');
            if (!frame) return;
            
            var doc = frame.contentDocument || frame.contentWindow.document;
            var items = doc.querySelectorAll('.goog-te-menu2-item span.text');
            
            // Mapowanie nazw języków Google
            var langMap = { 'en': 'English', 'pl': 'Polish', 'ru': 'Russian', 'de': 'German', 'es': 'Spanish' };
            
            for (var i = 0; i < items.length; i++) {
                if (items[i].innerText.includes(langMap[lang])) {
                    items[i].click();
                    break;
                }
            }
        }
    </script>
</body>
</html>
