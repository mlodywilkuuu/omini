<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>OMNI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex; flex-direction: column; align-items: center;
        }

        .glass-nav {
            margin-top: 20px; padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            display: flex; align-items: center; gap: 30px;
        }

        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        .nav-links a:hover { opacity: 1; }

        /* Poprawione menu języków */
        .lang-menu { position: relative; cursor: pointer; padding: 10px; }
        .lang-dropdown {
            position: absolute; top: 100%; right: 0;
            background: rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px; padding: 10px; list-style: none;
            opacity: 0; visibility: hidden; transition: 0.3s;
            width: 140px; margin-top: 10px;
        }
        .lang-menu:hover .lang-dropdown { opacity: 1; visibility: visible; }
        .lang-dropdown li { padding: 8px; display: flex; align-items: center; gap: 10px; }
        .lang-dropdown li:hover { background: rgba(255,255,255,0.1); border-radius: 5px; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: 3.5rem; margin-bottom: 20px; }
        
        .hero-btns { display: flex; gap: 15px; margin-top: 20px; }
        .btn { padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; color: white; }
        .btn-main { background: #00d2ff; color: #000; }
        .btn-sub { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">OMNI</div>
        <ul class="nav-links">
            <li><a href="#">Download</a></li>
            <li><a href="#">Themes</a></li>
            <li><a href="#">Plugins</a></li>
            <li><a href="#">Devs</a></li>
        </ul>
        
        <div class="lang-menu">
            🌐 <span>Język</span>
            <ul class="lang-dropdown">
                <li onclick="changeLang('en')">🇬🇧 English</li>
                <li onclick="changeLang('pl')">🇵🇱 Polski</li>
                <li onclick="changeLang('ru')">🇷🇺 Русский</li>
                <li onclick="changeLang('de')">🇩🇪 Deutsch</li>
                <li onclick="changeLang('es')">🇪🇸 Español</li>
            </ul>
        </div>
    </nav>

    <main>
        <h1>Zapanuj nad Discordem</h1>
        <div class="hero-btns">
            <a href="#" class="btn btn-main">Download</a>
            <a href="#" class="btn btn-sub">Documentation</a>
        </div>
    </main>

    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'pl'}, 'google_translate_element');
        }
        function changeLang(lang) {
            var selectField = document.querySelector("select.goog-te-combo");
            if (selectField) {
                selectField.value = lang;
                selectField.dispatchEvent(new Event('change'));
            }
        }
    </script>
</body>
</html>
